# Model
model_name_or_path: swiss-ai/Apertus-8B-Instruct-2509
dtype: bfloat16

# Dataset
dataset_name: /tmp/glossapi-trainer/data
dataset_train_split: train
dataset_test_split: validation
dataset_num_proc: 12

# Hyperparameters
learning_rate: 1.0e-4
gradient_checkpointing: false
num_train_epochs: 3.0
logging_steps: 5
per_device_train_batch_size: 1
gradient_accumulation_steps: 4

# LoRA / PEFT
use_peft: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules: all-linear

# Sequence length & scheduler
max_length: 2048
warmup_steps: 10
lr_scheduler_type: cosine_with_min_lr
lr_scheduler_kwargs:
  min_lr_rate: 0.1

# Evaluation and checkpointing
eval_strategy: "steps"
eval_steps: 10
save_strategy: "steps"
save_steps: 10
save_total_limit: 5
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false

# Output & logging
output_dir: /tmp/glossapi-trainer/output/apertus_lora_proper
report_to: "none"
seed: 42