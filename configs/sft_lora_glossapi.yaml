# Model
model_name_or_path: swiss-ai/Apertus-8B-Instruct-2509
dtype: bfloat16

# Dataset
dataset_name: /tmp/glossapi-trainer/data
dataset_train_split: train
dataset_test_split: validation
dataset_num_proc: 12

# Hyperparameters
learning_rate: 2.0e-4
gradient_checkpointing: true
num_train_epochs: 1.0
logging_steps: 1
per_device_train_batch_size: 4
gradient_accumulation_steps: 1

# LoRA / PEFT
use_peft: true
lora_r: 8
lora_alpha: 16
lora_dropout: 0.0
lora_target_modules: all-linear

# Sequence length & scheduler
max_length: 4096
warmup_ratio: 0.03
lr_scheduler_type: cosine_with_min_lr
lr_scheduler_kwargs:
  min_lr_rate: 0.1

# Output & logging
output_dir: /tmp/glossapi-trainer/output/apertus_lora_smoke
report_to: "none"
seed: 42
eval_strategy: "no"
